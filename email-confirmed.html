<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#1f4ec5" />
<title>Fridgy — Cont confirmat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand-1:#6daeff;--brand-2:#1f4ec5;--brand-deep:#0f2578;
    --primary:#0E7AFE;--ink:#0b1b3a;--muted:#5b6b8c;--bg:#eef5fe;
    --card:rgba(255,255,255,.72);--radius:26px;
    --shadow:0 24px 60px -20px rgba(31,78,197,.45);
    --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;overflow:hidden}

  .mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55}
  .b1{width:560px;height:560px;background:var(--brand-1);top:-180px;left:-140px;animation:f1 18s ease-in-out infinite}
  .b2{width:520px;height:520px;background:var(--brand-2);top:240px;right:-180px;animation:f2 22s ease-in-out infinite}
  .b3{width:440px;height:440px;background:#a9ccff;bottom:-200px;left:30%;animation:f1 26s ease-in-out infinite}
  @keyframes f1{50%{transform:translate(40px,-50px) scale(1.08)}}
  @keyframes f2{50%{transform:translate(-50px,40px) scale(1.1)}}

  .card{position:relative;z-index:1;background:var(--card);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.7);border-radius:var(--radius);
    padding:48px 40px;max-width:420px;width:92vw;text-align:center;
    box-shadow:var(--shadow)}
  .card img{width:120px;height:120px;border-radius:50%;margin:0 auto 24px;object-fit:contain}
  .check-icon{font-size:56px;margin-bottom:20px;color:#16a34a}
  h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
  h1 .grad{background:linear-gradient(120deg,var(--brand-1),var(--brand-2) 55%,var(--brand-deep));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin-bottom:0}
</style>
</head>
<body>

<div class="mesh" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<div class="card">
  <img src="/fridgy-logo.png" alt="Fridgy" />
  <div class="check-icon">&#10003;</div>
  <h1><span class="grad">Contul tau a fost confirmat!</span></h1>
  <p>Poti inchide aceasta pagina si te poti autentifica in aplicatia Fridgy.</p>
</div>

</body>
</html>
