<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#1f4ec5" />
<title>Fridgy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand-1:#6daeff;--brand-2:#1f4ec5;--brand-deep:#0f2578;
    --primary:#0E7AFE;--ink:#0b1b3a;--muted:#5b6b8c;--bg:#eef5fe;
    --card:rgba(255,255,255,.72);--radius:26px;
    --shadow:0 24px 60px -20px rgba(31,78,197,.45);
    --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;overflow:hidden}

  .mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55}
  .b1{width:560px;height:560px;background:var(--brand-1);top:-180px;left:-140px;animation:f1 18s ease-in-out infinite}
  .b2{width:520px;height:520px;background:var(--brand-2);top:240px;right:-180px;animation:f2 22s ease-in-out infinite}
  .b3{width:440px;height:440px;background:#a9ccff;bottom:-200px;left:30%;animation:f1 26s ease-in-out infinite}
  @keyframes f1{50%{transform:translate(40px,-50px) scale(1.08)}}
  @keyframes f2{50%{transform:translate(-50px,40px) scale(1.1)}}

  .card{position:relative;z-index:1;background:var(--card);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.7);border-radius:var(--radius);
    padding:48px 40px;max-width:420px;width:92vw;text-align:center;
    box-shadow:var(--shadow)}
  .card img{width:160px;height:160px;border-radius:50%;margin:0 auto 24px;object-fit:contain}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
  h1 .grad{background:linear-gradient(120deg,var(--brand-1),var(--brand-2) 55%,var(--brand-deep));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:0}

  .status-icon{font-size:56px;margin-bottom:16px;color:#dc2626}

  .hidden{display:none}

  .spinner{width:36px;height:36px;border:4px solid rgba(31,78,197,.15);
    border-top-color:var(--primary);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="mesh" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<div class="card">
  <img src="/fridgy-logo.png" alt="Fridgy" />

  <!-- Loading -->
  <div id="state-loading">
    <div class="spinner"></div>
    <h1><span class="grad" id="txt-loading"></span></h1>
    <p id="txt-loading-desc"></p>
  </div>

  <!-- Success -->
  <div id="state-success" class="hidden">
    <h1><span class="grad" id="txt-success"></span></h1>
    <p id="txt-success-desc"></p>
  </div>

  <!-- Already verified -->
  <div id="state-already" class="hidden">
    <h1><span class="grad" id="txt-already"></span></h1>
    <p id="txt-already-desc"></p>
  </div>

  <!-- Error -->
  <div id="state-error" class="hidden">
    <h1><span class="grad" id="txt-error"></span></h1>
    <p id="txt-error-desc"></p>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var lang = params.get('lang') || 'ro';

  var t = {
    ro: {
      loading: 'Se verifica...',
      loadingDesc: 'Te rugam sa astepti cateva secunde.',
      success: 'Contul tau a fost confirmat!',
      successDesc: 'Poti inchide aceasta pagina si te poti autentifica in aplicatia Fridgy.',
      already: 'Contul tau a fost confirmat!',
      alreadyDesc: 'Emailul tau era deja verificat. Te poti autentifica in aplicatia Fridgy.',
      error: 'Link invalid',
      errorDesc: 'Linkul de verificare este invalid sau a expirat. Incearca sa soliciti un nou email de verificare din aplicatie.'
    },
    en: {
      loading: 'Verifying...',
      loadingDesc: 'Please wait a few seconds.',
      success: 'Your account has been confirmed!',
      successDesc: 'You can close this page and sign in to the Fridgy app.',
      already: 'Your account has been confirmed!',
      alreadyDesc: 'Your email was already verified. You can sign in to the Fridgy app.',
      error: 'Invalid link',
      errorDesc: 'The verification link is invalid or has expired. Try requesting a new verification email from the app.'
    }
  };

  var i18n = t[lang] || t['ro'];
  document.documentElement.lang = lang;
  document.getElementById('txt-loading').textContent = i18n.loading;
  document.getElementById('txt-loading-desc').textContent = i18n.loadingDesc;
  document.getElementById('txt-success').textContent = i18n.success;
  document.getElementById('txt-success-desc').textContent = i18n.successDesc;
  document.getElementById('txt-already').textContent = i18n.already;
  document.getElementById('txt-already-desc').textContent = i18n.alreadyDesc;
  document.getElementById('txt-error').textContent = i18n.error;
  document.getElementById('txt-error-desc').textContent = i18n.errorDesc;

  function show(id) {
    document.getElementById('state-loading').classList.add('hidden');
    document.getElementById('state-success').classList.add('hidden');
    document.getElementById('state-already').classList.add('hidden');
    document.getElementById('state-error').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
  }

  if (!token) { show('state-error'); return; }

  fetch('https://api.fridgy.org/api/verify-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ token: token })
  })
  .then(function(res) { return res.json().then(function(data) { return { status: res.status, data: data }; }); })
  .then(function(result) {
    if (result.status === 200 && result.data.already_verified) {
      show('state-already');
    } else if (result.status === 200) {
      show('state-success');
    } else {
      show('state-error');
    }
  })
  .catch(function() { show('state-error'); });
})();
</script>
</body>
</html>
